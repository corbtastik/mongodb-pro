# AppDB mongod configuration for Ops Manager
# 3-node replica set running on ports 27017, 27018, 27019
#
# NOTE: This is a reference file. The actual configs are generated
# by 02-install-appdb.sh at /etc/mongod-rs{1,2,3}.conf in the VM.
#
# Ops Manager 8.0 requires a 3-node replica set for the AppDB.
# For dev environments, all 3 nodes run in the same VM on different ports.

# Example config for one node:
storage:
  dbPath: /var/lib/mongodb/rs1

systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod-rs1.log

net:
  port: 27017
  bindIp: 0.0.0.0

processManagement:
  timeZoneInfo: /usr/share/zoneinfo

replication:
  replSetName: appdbRS
