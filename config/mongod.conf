# AppDB mongod configuration for Ops Manager
# Single-node replica set for Ops Manager Application Database

# Where and how to store data
storage:
  dbPath: /var/lib/mongodb

# Where to write logging data
systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log

# Network interfaces
net:
  port: 27017
  bindIp: 0.0.0.0

# Process management
processManagement:
  timeZoneInfo: /usr/share/zoneinfo

# Replica set configuration
replication:
  replSetName: appdbRS