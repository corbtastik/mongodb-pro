# NodePort services for external access to MongoDB deployments
# These expose MongoDB to the macOS host

apiVersion: v1
kind: Service
metadata:
  name: demo-standalone-external
  namespace: mongodb
spec:
  type: NodePort
  selector:
    app: demo-standalone-svc
  ports:
    - port: 27017
      targetPort: 27017
      nodePort: 31261

---
apiVersion: v1
kind: Service
metadata:
  name: demo-rs-external
  namespace: mongodb
spec:
  type: NodePort
  selector:
    app: demo-rs-svc
  ports:
    - port: 27017
      targetPort: 27017
      nodePort: 30191
