apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Note: namespace is set by overlays, not here
# Note: namespace.yaml is created by each overlay for isolation

resources:
  - ops-manager-config.yaml
  - mongodb.yaml
  - service.yaml
  - users-secret.yaml
  - users.yaml

# Note: ops-manager-secret.yaml is provided by each overlay with real credentials
